<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLMS - 入庫処理 (Barcode Receive)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes scan {
            0% { transform: translateY(-100%); }
            50% { transform: translateY(100%); }
            100% { transform: translateY(-100%); }
        }
        .scanner-beam {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(34, 197, 94, 0.8);
            box-shadow: 0 0 10px rgba(34, 197, 94, 1), 0 0 20px rgba(34, 197, 94, 0.6);
            animation: scan 2s infinite linear;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen">
    <!-- Render Global Navbar -->
    <div th:replace="~{fragments/nav :: navbar}"></div>

    <div class="max-w-2xl w-full mx-auto mt-12">

        <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100 relative">
            <div class="bg-indigo-600 text-white p-6 text-center">
                <h1 class="text-3xl font-extrabold tracking-wider">📦 バコード入庫処理</h1>
                <p class="text-indigo-100 mt-2 text-sm">注文コード(Order Number)をスキャンしてください。</p>
            </div>
            
            <div class="p-10">
                <!-- Alerts -->
                <div th:if="${message}" class="bg-green-50 border border-green-200 text-green-700 p-4 mb-8 rounded-lg shadow-sm flex items-center" role="alert">
                    <svg class="w-6 h-6 mr-3 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <p th:text="${message}" class="font-bold text-lg"></p>
                </div>
                <div th:if="${error}" class="bg-red-50 border border-red-200 text-red-700 p-4 mb-8 rounded-lg shadow-sm flex items-center" role="alert">
                    <svg class="w-6 h-6 mr-3 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <p th:text="${error}" class="font-bold text-lg"></p>
                </div>

                <form action="/receive/process" method="post" id="barcodeForm" class="relative">
                    <div class="relative rounded-xl border-4 border-indigo-100 bg-indigo-50/30 overflow-hidden group focus-within:border-indigo-400 transition">
                        <!-- Scanner Animation -->
                        <div class="scanner-beam hidden group-focus-within:block"></div>
                        
                        <input type="text" 
                               name="orderNumber" 
                               id="orderNumber" 
                               placeholder="バコードをスキャン..." 
                               autofocus 
                               autocomplete="off"
                               class="w-full text-center text-4xl font-mono text-indigo-900 bg-transparent py-12 focus:outline-none placeholder-gray-300 tracking-widest">
                    </div>
                </form>
            </div>
            <div class="bg-gray-50 border-t border-gray-100 p-6 text-center">
                <p class="text-sm font-medium text-gray-500">※ 入力後、すぐに Enter キーが送信(自動認識)されます。</p>
            </div>
        </div>
    </div>

    <script>
        // Keep focus locked to the barcode input so scanner flow never breaks
        document.addEventListener('click', function(e) {
            document.getElementById('orderNumber').focus();
        });

        const form = document.getElementById('barcodeForm');
        let scanTimeout;
        document.getElementById('orderNumber').addEventListener('input', function() {
            // Usually scanners send a burst of text incredibly fast, followed by an Enter key.
            // If the user happens to paste or type it, let's still just rely on the Enter key submission 
            // natively handled by browser form submit on inputs.
        });
    </script>
</body>
</html>
