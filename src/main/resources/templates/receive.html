<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLMS - 入庫処理 (Barcode Receive)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes scan {
            0% { transform: translateY(-100%); }
            50% { transform: translateY(100%); }
            100% { transform: translateY(-100%); }
        }
        .scanner-beam {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(34, 197, 94, 0.8);
            box-shadow: 0 0 10px rgba(34, 197, 94, 1), 0 0 20px rgba(34, 197, 94, 0.6);
            animation: scan 2s infinite linear;
            z-index: 10;
        }
    </style>
    <style>
        @font-face {
            font-family: 'UDEVGothicJPDOC';
            src: url('/fonts/UDEVGothicJPDOC-Regular.ttf') format('truetype');
        }
        body { font-family: 'UDEVGothicJPDOC', sans-serif !important; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen">
    <!-- Render Global Navbar -->
    <div th:replace="~{fragments/nav :: navbar('receive')}"></div>

    <div class="max-w-2xl w-full mx-auto mt-12 relative px-4 text-right mb-4">
        <!-- Part Search Button -->
        <button onclick="openModal('partSearchModal')" class="bg-white border-2 border-indigo-200 hover:bg-indigo-50 text-indigo-700 font-extrabold py-2 px-5 rounded-full shadow transition inline-flex items-center gap-2">
            <span>🔍</span> 部品マスター検索
        </button>
    </div>

    <div class="max-w-2xl w-full mx-auto px-4">
        <div class="bg-white rounded-2xl shadow-xl border border-gray-100 relative">
            <div class="bg-indigo-600 rounded-t-2xl text-white p-6 text-center">
                <h1 class="text-3xl font-extrabold tracking-wider">📦 バコード入庫処理</h1>
                <p class="text-indigo-100 mt-2 text-sm">注文コード(Order Number)をスキャンしてください。</p>
            </div>
            
            <div class="p-10">
                <!-- Alerts -->
                <div th:if="${message}" class="bg-green-50 border border-green-200 text-green-700 p-4 mb-8 rounded-lg shadow-sm flex items-center" role="alert">
                    <svg class="w-6 h-6 mr-3 text-green-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <p th:text="${message}" class="font-bold text-lg"></p>
                </div>
                <div th:if="${error}" class="bg-red-50 border border-red-200 text-red-700 p-4 mb-8 rounded-lg shadow-sm flex items-center" role="alert">
                    <svg class="w-6 h-6 mr-3 text-red-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <p th:text="${error}" class="font-bold text-lg"></p>
                </div>

                <!-- Virtual Scanner Form -->
                <div class="relative z-20">
                    <div class="relative rounded-xl border-4 border-indigo-100 bg-indigo-50/30 overflow-visible group focus-within:border-indigo-400 transition" id="inputContainer">
                        <!-- Scanner Animation -->
                        <div class="scanner-beam hidden group-focus-within:block"></div>
                        
                        <input type="text" 
                               id="orderNumber" 
                               placeholder="バコードをスキャン..." 
                               autofocus 
                               autocomplete="off"
                               onkeypress="handleScannerEnter(event)"
                               class="w-full text-center text-4xl font-mono text-indigo-900 bg-transparent py-12 focus:outline-none placeholder-gray-300 tracking-widest relative z-20">
                        
                        <!-- Autocomplete Dropdown -->
                        <ul id="autocompleteList" class="absolute left-0 right-0 top-full mt-2 bg-white border-2 border-indigo-200 shadow-2xl rounded-xl max-h-64 overflow-y-auto hidden z-50">
                            <!-- Populated by JS -->
                        </ul>
                    </div>
                </div>

                <!-- Real Form Hidden under the hood -->
                <form action="/receive/process" method="post" id="realSubmitForm" class="hidden">
                    <input type="hidden" name="orderNumber" id="receiveSubmitOrderNo">
                    <input type="hidden" name="receivedQuantity" id="receiveSubmitQty">
                </form>
            </div>
            <div class="bg-gray-50 border-t border-gray-100 rounded-b-2xl p-6 text-center">
                <p class="text-sm font-medium text-gray-500">※ 入力後、すぐに Enter キーが送信(自動認識)されます。</p>
            </div>
        </div>
    </div>


    <!-- Modals Background -->
    <div id="modalOverlay" class="fixed inset-0 bg-gray-900/60 backdrop-blur-sm z-40 hidden transition-opacity" onclick="closeAllModals()"></div>

    <!-- 部品マスター検索 モーダル (Part Search Directory) -->
    <div id="partSearchModal" class="fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-full max-w-4xl bg-white rounded-2xl shadow-2xl z-50 hidden flex flex-col max-h-[85vh]" role="dialog">
         <div class="flex justify-between items-center border-b p-5 bg-gray-800 rounded-t-2xl">
            <h2 class="text-xl font-extrabold tracking-wider text-white">🔍 登録部品 検索</h2>
            <button onclick="closeAllModals()" class="text-gray-400 hover:text-white transition">
                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L6 6l12 12M18 6L6 18" /></svg>
            </button>
        </div>
        <div class="p-6 flex-1 overflow-hidden flex flex-col">
            <input type="text" id="masterSearch" onkeyup="filterMasterTable()" placeholder="部品コード、名称でマスターを高速検索..." class="w-full border-2 border-gray-300 rounded-lg p-3 text-lg font-bold focus:ring-indigo-500 focus:border-indigo-500 bg-gray-50 shadow-inner mb-4">
            
            <div class="overflow-y-auto border rounded-xl border-gray-200 flex-1">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-100 sticky top-0 shadow-sm z-10">
                        <tr>
                            <th class="px-4 py-3 text-left text-xs font-bold text-gray-600 uppercase">部品コード</th>
                            <th class="px-4 py-3 text-left text-xs font-bold text-gray-600 uppercase">名称</th>
                            <th class="px-4 py-3 text-center text-xs font-bold text-gray-600 uppercase">単価</th>
                            <th class="px-4 py-3 text-center text-xs font-bold text-gray-600 uppercase">注文単位</th>
                            <th class="px-4 py-3 text-center text-xs font-bold text-gray-600 uppercase">L/T(日)</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100 bg-white">
                        <tr th:each="m : ${allMasterParts}" class="hover:bg-gray-50 master-row">
                            <td class="px-4 py-3 font-bold text-indigo-700 master-code" th:text="${m.productCode}"></td>
                            <td class="px-4 py-3 text-sm text-gray-800 font-bold master-name" th:text="${m.name}"></td>
                            <td class="px-4 py-3 text-center text-sm font-bold text-gray-600" th:text="'¥' + ${m.price}"></td>
                            <td class="px-4 py-3 text-center text-sm font-bold bg-gray-50" th:text="${m.orderUnit} + '個'"></td>
                            <td class="px-4 py-3 text-center text-sm font-bold text-gray-600" th:text="${m.leadTimeDays}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="mt-4 text-center border-t pt-4">
                 <button type="button" onclick="closeAllModals()" class="px-6 py-2 bg-gray-800 text-white font-bold rounded-lg hover:bg-gray-700 shadow transition">閉じる</button>
            </div>
        </div>
    </div>


    <script th:inline="javascript">
        // Embed pending orders array directly from Thymeleaf
        const pendingOrders = /*[[${pendingOrders}]]*/ [];
        
        // --- Autocomplete Logic ---
        const orderInput = document.getElementById('orderNumber');
        const acList = document.getElementById('autocompleteList');
        const form = document.getElementById('barcodeForm');

        // Hide overlay on outside click
        document.addEventListener('click', function(e) {
            if (!document.getElementById('inputContainer').contains(e.target)) {
                acList.classList.add('hidden');
                // Keep focus locked slowly unless they opened the modal
                if(document.getElementById('partSearchModal').classList.contains('hidden')) {
                    orderInput.focus();
                }
            }
        });

        orderInput.addEventListener('input', function() {
            const val = this.value.toUpperCase();
            acList.innerHTML = ''; // clear
            
            // If scanner bursts data, it's usually >10 chars in 1ms. 
            // We only show autocomplete if user types slowly (e.g. at least 2 chars manually)
            if (val.length < 2) {
                acList.classList.add('hidden');
                return;
            }

            // Filter
            const matches = pendingOrders.filter(o => 
                (o.orderNumber && o.orderNumber.toUpperCase().includes(val)) || 
                (o.part && o.part.name && o.part.name.toUpperCase().includes(val)) ||
                (o.part && o.part.productCode && o.part.productCode.toUpperCase().includes(val))
            );

            if (matches.length > 0) {
                acList.classList.remove('hidden');
                matches.forEach(o => {
                    const li = document.createElement('li');
                    li.className = "px-5 py-4 border-b hover:bg-indigo-50 cursor-pointer flex justify-between items-center transition";
                    
                    const leftDiv = document.createElement('div');
                    leftDiv.innerHTML = `<p class="font-mono font-extrabold text-blue-700 text-lg tracking-wider">${o.orderNumber}</p>
                                         <p class="text-xs font-bold text-gray-500 mt-1">${o.part ? o.part.productCode + ' - ' + o.part.name : 'Unknown'}</p>`;
                    
                    const rightDiv = document.createElement('div');
                    rightDiv.className = "text-right";
                    rightDiv.innerHTML = `<span class="bg-blue-100 text-blue-800 text-xs font-bold px-2 py-1 rounded">入庫予定: ${o.quantity}個</span>`;
                    
                    li.appendChild(leftDiv);
                    li.appendChild(rightDiv);

                    // Setup User Confirmation on click
                    li.addEventListener('click', function() {
                        orderInput.value = o.orderNumber;
                        acList.classList.add('hidden');
                        triggerEntryFlow(o);
                    });

                    acList.appendChild(li);
                });
            } else {
                acList.classList.add('hidden');
            }
        });

        // Trigger logic abstract
        function triggerEntryFlow(orderObj) {
            let remain = orderObj.quantity - (orderObj.receivedQuantity || 0);
            if (remain <= 0) remain = orderObj.quantity; // Guard

            let promptQ = prompt(`[${orderObj.orderNumber}] ${orderObj.part.name}\n현재 잔여 입고(예정)수량은 ${remain}개입니다.\n\n실제로 입고된 수량을 입력해주세요:`, remain);
            
            if (promptQ !== null) {
                let qtyNum = parseInt(promptQ);
                if (isNaN(qtyNum) || qtyNum <= 0) {
                    alert('유효하지 않은 수량입니다. 처리를 취소합니다.');
                    return;
                }
                
                if (qtyNum > remain) {
                    let ok = confirm('⚠️ 지정된 입하 예정 수량을 초과하였습니다!\n초과된 물량이 입고될 예정입니다. 괜찮으시겠습니까?');
                    if (!ok) return;
                }

                document.getElementById('receiveSubmitOrderNo').value = orderObj.orderNumber;
                document.getElementById('receiveSubmitQty').value = qtyNum;
                document.getElementById('realSubmitForm').submit();
            }
            orderInput.focus();
        }

        function handleScannerEnter(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                const str = orderInput.value.trim().toUpperCase();
                const match = pendingOrders.find(o => o.orderNumber.toUpperCase() === str);
                if (match) {
                    triggerEntryFlow(match);
                } else {
                    alert('일치하는 대기 중(PENDING) 주문이 없습니다. 부품 마스터 검색이나 수동 배치를 확인해주세요.');
                }
            }
        }

        // --- Modals Control ---
        const modalOverlay = document.getElementById('modalOverlay');
        
        function openModal(id) {
            modalOverlay.classList.remove('hidden');
            document.getElementById(id).classList.remove('hidden');
        }

        function closeAllModals() {
            modalOverlay.classList.add('hidden');
            document.getElementById('partSearchModal').classList.add('hidden');
            orderInput.focus();
        }

        function filterMasterTable() {
            var input = document.getElementById("masterSearch").value.toUpperCase();
            var rows = document.querySelectorAll(".master-row");
            rows.forEach(function(row) {
                var codeText = row.querySelector(".master-code").textContent;
                var nameText = row.querySelector(".master-name").textContent;
                if (codeText.toUpperCase().indexOf(input) > -1 || nameText.toUpperCase().indexOf(input) > -1) {
                    row.style.display = "";
                } else {
                    row.style.display = "none";
                }
            });
        }
    </script>
</body>
</html>
